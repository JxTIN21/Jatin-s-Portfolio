<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ── Primary Meta ── -->
    <title>Jatin Srivastava — Full Stack & AI Developer</title>
    <meta name="description" content="Portfolio of Jatin Srivastava, a Full Stack Developer building scalable web applications and AI-powered systems using React, Node.js, and modern ML tools." />
    <meta name="author" content="Jatin Srivastava" />
    <meta name="keywords" content="Jatin Srivastava, Full Stack Developer, AI Developer, React, Node.js, Portfolio" />
    <meta name="theme-color" content="#0C0C0C" />
    <link rel="canonical" href="https://jatins-portfolio-five.vercel.app" />

    <!-- ── Open Graph (LinkedIn, WhatsApp, Facebook) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jatins-portfolio-five.vercel.app" />
    <meta property="og:title" content="Jatin Srivastava — Full Stack & AI Developer" />
    <meta property="og:description" content="Full Stack Developer specialising in React, Node.js, and AI integration. Building scalable web apps and intelligent systems." />
    <meta property="og:image" content="https://jatins-portfolio-five.vercel.app/og-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Jatin Srivastava" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jatin Srivastava — Full Stack & AI Developer" />
    <meta name="twitter:description" content="Full Stack Developer specialising in React, Node.js, and AI integration." />
    <meta name="twitter:image" content="https://jatins-portfolio-five.vercel.app/og-preview.png" />

    <!-- ── Favicons ── -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Fonts: Kanit (self-hosted via fontsource) ──
         Run: npm install @fontsource/kanit
         Then import in your index.tsx:
           import '@fontsource/kanit/400.css';
           import '@fontsource/kanit/700.css';
           import '@fontsource/kanit/900.css';
         Remove this block once you do that. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700;900&display=swap" rel="stylesheet" />

    <!-- ── Performance hints ── -->
    <!-- Preload your hero image so LCP is fast -->
    <link rel="preload" href="%PUBLIC_URL%/images/MyIcon.png" as="image" />

    <!-- ── Structured Data (shows up in Google search results) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Jatin Srivastava",
      "url": "https://jatinsrivastava.dev",
      "jobTitle": "Full Stack Developer",
      "description": "Full Stack Developer specialising in React, Node.js, and AI-powered systems.",
      "sameAs": [
        "https://github.com/JxTIN21",
        "https://www.linkedin.com/in/jatin-srivastava"
      ]
    }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
